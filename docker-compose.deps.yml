# Input: 环境变量 (Postgres/Redis images)
# Output: 基础依赖服务 (DB, Redis)
# Pos: 根目录/Dev Ops
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。

services:
  nexus-db:
    image: postgres:14-alpine
    container_name: nexus-db
    environment:
      POSTGRES_DB: nexusarchive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54321:5432" # Host Mode Dev Port
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "16379:6379" # Host Mode Dev Port
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nexus-db-data:
