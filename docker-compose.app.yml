# ==============================================================================
# 应用服务配置 - Backend + Frontend
# ==============================================================================
# 用途: 服务器部署（本地开发应用直接跑在宿主机上）
# 启动: docker-compose -f docker-compose.infra.yml \
#                -f docker-compose.app.yml \
#                --env-file .env.server up -d
#
# 说明:
#   - 本地开发时不需要此文件，应用直接在宿主机运行
#   - 服务器部署时与 infra.yml 配合使用
#   - 使用 Docker 内部网络连接 DB 和 Redis
# ==============================================================================

services:
  # Java 后端
  nexus-backend:
    image: nexusarchive-backend:${TAG:-latest}
    build:
      context: ./nexusarchive-java
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    depends_on:
      nexus-db:
        condition: service_healthy
      nexus-redis:
        condition: service_healthy
    environment:
      # 数据库配置（Docker 内部网络）
      DB_HOST: nexus-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexusarchive}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      # Redis 配置（Docker 内部网络）
      REDIS_HOST: nexus-redis
      REDIS_PORT: 6379

      # Spring Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # Seed data 自动导入
      SEED_AUTO_IMPORT: "true"

      # 安全配置
      SM4_KEY: ${SM4_KEY}
      AUDIT_LOG_HMAC_KEY: ${AUDIT_LOG_HMAC_KEY}
      JWT_PUBLIC_KEY_LOCATION: file:/app/keystore/jwt_public.pem
      JWT_PRIVATE_KEY_LOCATION: file:/app/keystore/jwt_private.pem

      # CORS
      APP_SECURITY_CORS_ALLOWED_ORIGINS: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost}

      # 其他配置
      VIRUS_SCAN_TYPE: ${VIRUS_SCAN_TYPE:-mock}
      TIMESTAMP_FALLBACK: ${TIMESTAMP_FALLBACK:-true}
      SCHEMA_VALIDATION_ENABLED: ${SCHEMA_VALIDATION_ENABLED:-false}
      SCHEMA_VALIDATION_FAIL: ${SCHEMA_VALIDATION_FAIL:-false}

      # YonSuite（可选）
      YONSUITE_APP_KEY: ${YONSUITE_APP_KEY:-}
      YONSUITE_APP_SECRET: ${YONSUITE_APP_SECRET:-}

    ports:
      - "${SERVER_PORT:-19090}:19090"
    volumes:
      - ./nexusarchive-java/data:/app/data
      - ./nexusarchive-java/keystore:/app/keystore
      # AI 生成的适配器代码持久化
      - ./nexusarchive-java/src/main/java/com/nexusarchive/integration/erp/adapter:/app/src/main/java/com/nexusarchive/integration/erp/adapter
      - ./nexusarchive-java/src/test/java/com/nexusarchive/integration/erp/adapter:/app/src/test/java/com/nexusarchive/integration/erp/adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:19090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端（Nginx 托管静态文件）
  nexus-frontend:
    image: nexusarchive-web:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    container_name: nexus-frontend
    restart: unless-stopped
    depends_on:
      - nexus-backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
