name: Deploy Prod via SSH

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/sha)"
        required: true
        default: "main"
      attachment_scan_limit:
        description: "Attachment gate scan limit"
        required: true
        default: "200000"
      attachment_sample_limit:
        description: "Attachment gate recovery probe sample limit"
        required: true
        default: "300"
      attachment_target_file_id:
        description: "Attachment gate target file id for metadata check"
        required: true
        default: "f4653466-b670-a083-acff-19ff6d55be02"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build frontend
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Build backend
        run: |
          set -euo pipefail
          cd nexusarchive-java
          mvn -DskipTests -Dmaven.compiler.failOnWarning=false clean package

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -p "${{ secrets.PROD_PORT }}" "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload attachment gate scripts
        run: |
          set -euo pipefail
          scp -i ~/.ssh/prod_key -P "${{ secrets.PROD_PORT }}" \
            scripts/prod_attachment_audit.sh \
            scripts/prod_attachment_audit.sql \
            scripts/prod_attachment_gate.sh \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/"

      - name: Pre-deploy attachment gate (block on missing files)
        run: |
          set -euo pipefail
          GATE_OUT="/tmp/nexusarchive_attachment_gate_${{ github.run_id }}_${{ github.run_attempt }}"
          ssh -i ~/.ssh/prod_key -p "${{ secrets.PROD_PORT }}" \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "chmod +x /tmp/prod_attachment_audit.sh /tmp/prod_attachment_gate.sh && \
             SCAN_LIMIT='${{ github.event.inputs.attachment_scan_limit }}' \
             SAMPLE_LIMIT='${{ github.event.inputs.attachment_sample_limit }}' \
             TARGET_FILE_ID='${{ github.event.inputs.attachment_target_file_id }}' \
             MAX_MISSING_ALLOWED='0' \
             WORK_DIR='${GATE_OUT}' \
             bash /tmp/prod_attachment_gate.sh"

      - name: Check remote disk space
        run: |
            ssh -i ~/.ssh/prod_key -p "${{ secrets.PROD_PORT }}" "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "df -h /opt && echo '--- Disk space check passed ---'"

      - name: Rsync dist and jar (incremental)
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/prod_key -p "${{ secrets.PROD_PORT }}" "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "mkdir -p /opt/nexusarchive/dist /opt/nexusarchive/nexusarchive-java/target"

          echo "[1/2] Syncing frontend (dist/)"
          rsync -av --progress --timeout=300 --delete -e "ssh -i ~/.ssh/prod_key -p ${{ secrets.PROD_PORT }}" \
            dist/ "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/nexusarchive/dist/"

          echo "[2/2] Syncing backend (jar)"
          rsync -av --progress --timeout=300 -e "ssh -i ~/.ssh/prod_key -p ${{ secrets.PROD_PORT }}" \
            nexusarchive-java/target/nexusarchive-backend-*.jar \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/nexusarchive/nexusarchive-java/target/"

      - name: Deploy artifacts on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/nexusarchive

            echo "[1/5] Backup database"
            docker exec nexus-db pg_dump -U postgres nexusarchive > /opt/nexusarchive/backup_$(date +%F_%H%M%S).sql

            echo "[2/5] Artifacts already synced by rsync"

            echo "[4/5] Ensure JWT key files and env"
            mkdir -p /opt/nexusarchive/nexusarchive-java/keystore
            mkdir -p /etc/nexusarchive
            touch /etc/nexusarchive/nexusarchive.env

            if [ ! -s /opt/nexusarchive/nexusarchive-java/keystore/jwt_private.pem ] || [ ! -s /opt/nexusarchive/nexusarchive-java/keystore/jwt_public.pem ]; then
              openssl genrsa -out /opt/nexusarchive/nexusarchive-java/keystore/jwt_private.pem 2048
              openssl rsa -in /opt/nexusarchive/nexusarchive-java/keystore/jwt_private.pem -pubout -out /opt/nexusarchive/nexusarchive-java/keystore/jwt_public.pem >/dev/null 2>&1
            fi

            if ! grep -q '^JWT_PUBLIC_KEY_LOCATION=' /etc/nexusarchive/nexusarchive.env; then
              echo 'JWT_PUBLIC_KEY_LOCATION=file:/opt/nexusarchive/nexusarchive-java/keystore/jwt_public.pem' >> /etc/nexusarchive/nexusarchive.env
            fi
            if ! grep -q '^JWT_PRIVATE_KEY_LOCATION=' /etc/nexusarchive/nexusarchive.env; then
              echo 'JWT_PRIVATE_KEY_LOCATION=file:/opt/nexusarchive/nexusarchive-java/keystore/jwt_private.pem' >> /etc/nexusarchive/nexusarchive.env
            fi

            grep -E '^JWT_(PUBLIC|PRIVATE)_KEY_LOCATION=' /etc/nexusarchive/nexusarchive.env || true
            ls -l /opt/nexusarchive/nexusarchive-java/keystore/jwt_private.pem /opt/nexusarchive/nexusarchive-java/keystore/jwt_public.pem

            echo "[5/6] Restart service"
            systemctl restart nexusarchive
            systemctl status nexusarchive --no-pager -l

            echo "[5.1/6] Check Flyway migration status"
            docker exec -e "PGPASSWORD=pPSB3+HqgkqxM3WL" nexus-db \
              psql -h 127.0.0.1 -U postgres -d nexusarchive \
              -c "select version, description, success from flyway_schema_history order by installed_rank desc limit 5;" || true

            echo "[5.2/6] Auto-repair Flyway if failed (Postgres manual repair)"
            # 如果有失败的迁移记录，将其删除以便下一次启动能重试。这等同于 flyway repair 的部分核心逻辑。
            docker exec -e "PGPASSWORD=pPSB3+HqgkqxM3WL" nexus-db \
              psql -h 127.0.0.1 -U postgres -d nexusarchive \
              -c "DELETE FROM flyway_schema_history WHERE success = false;" || true

            echo "[6/6] Wait for health"
            ok=0
            for i in $(seq 1 24); do
              if curl -fsS https://www.digivoucher.cn/api/health >/dev/null 2>&1; then
                ok=1
                break
              fi
              echo "health not ready: attempt ${i}/24"
              sleep 5
            done

            if [ "$ok" -ne 1 ]; then
              echo "Health check timeout"
              systemctl status nexusarchive --no-pager -l || true
              journalctl -u nexusarchive -n 120 --no-pager || true
              exit 1
            fi

            curl -i https://www.digivoucher.cn/api/health
