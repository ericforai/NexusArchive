name: Deploy Prod via SSH

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/sha)"
        required: true
        default: "main"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build frontend
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Build backend
        run: |
          set -euo pipefail
          cd nexusarchive-java
          mvn -DskipTests -Dmaven.compiler.failOnWarning=false clean package

      - name: Pack deploy artifacts
        run: |
          set -euo pipefail
          rm -rf ci-artifacts
          mkdir -p ci-artifacts
          cp -r dist ci-artifacts/dist
          cp nexusarchive-java/target/nexusarchive-backend-*.jar ci-artifacts/
          tar -czf nexusarchive-artifacts.tar.gz -C ci-artifacts .
          ls -lh nexusarchive-artifacts.tar.gz

      - name: Validate artifact size
        run: |
          set -euo pipefail
          SIZE_MB=$(du -m nexusarchive-artifacts.tar.gz | awk '{print $1}')
          echo "artifact size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 600 ]; then
            echo "Artifact too large (>600MB), aborting upload."
            exit 1
          fi

      - name: Upload artifacts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          source: "nexusarchive-artifacts.tar.gz"
          target: "/opt/nexusarchive"
          timeout: "120s"
          command_timeout: "20m"
          overwrite: true

      - name: Deploy artifacts on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/nexusarchive

            echo "[1/5] Backup database"
            docker exec nexus-db pg_dump -U postgres nexusarchive > /opt/nexusarchive/backup_$(date +%F_%H%M%S).sql

            echo "[2/5] Unpack artifacts"
            rm -rf /opt/nexusarchive/.ci-artifacts
            mkdir -p /opt/nexusarchive/.ci-artifacts
            tar -xzf /opt/nexusarchive/nexusarchive-artifacts.tar.gz -C /opt/nexusarchive/.ci-artifacts

            echo "[3/5] Replace dist and jar"
            mkdir -p /opt/nexusarchive/nexusarchive-java/target
            rm -rf /opt/nexusarchive/dist
            cp -r /opt/nexusarchive/.ci-artifacts/dist /opt/nexusarchive/dist
            cp /opt/nexusarchive/.ci-artifacts/nexusarchive-backend-*.jar /opt/nexusarchive/nexusarchive-java/target/

            echo "[4/5] Restart service"
            systemctl restart nexusarchive
            systemctl status nexusarchive --no-pager -l

            echo "[5/5] Wait for health"
            timeout=120
            elapsed=0
            until curl -fsS https://www.digivoucher.cn/api/health >/dev/null 2>&1; do
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Health check timeout"
                journalctl -u nexusarchive -n 120 --no-pager || true
                exit 1
              fi
              sleep 5
              elapsed=$((elapsed + 5))
            done
            curl -i https://www.digivoucher.cn/api/health
