# Input: 配置参数
# Output: 配置文件
# Pos: 配置文件
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。

name: 权限系统测试

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 后端权限测试
  backend-permission-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexusarchive_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 运行权限单元测试
        run: |
          cd nexusarchive-java
          mvn test "-Dtest=*Permission*,*RoleValidation*" -DforkCount=0
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nexusarchive_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  # 后端集成测试（需要完整应用启动）
  backend-integration-tests:
    runs-on: ubuntu-latest
    needs: backend-permission-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexusarchive
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 编译后端
        run: |
          cd nexusarchive-java
          mvn compile -DskipTests

      - name: 准备 JWT 测试密钥
        run: |
          set -euo pipefail
          mkdir -p nexusarchive-java/src/main/resources/keystore
          openssl genrsa -out nexusarchive-java/src/main/resources/keystore/jwt_private.pem 2048
          openssl rsa -in nexusarchive-java/src/main/resources/keystore/jwt_private.pem -pubout -out nexusarchive-java/src/main/resources/keystore/jwt_public.pem >/dev/null 2>&1

      - name: 启动后端服务
        run: |
          set -euo pipefail
          cd nexusarchive-java
          nohup mvn spring-boot:run -Dspring-boot.run.profiles=test -Dmaven.test.skip=true > /tmp/nexusarchive-backend.log 2>&1 &
          APP_PID=$!
          ok=0
          for i in $(seq 1 48); do
            if curl -sS http://localhost:8080/api/health >/dev/null 2>&1; then
              ok=1
              break
            fi
            if ! kill -0 "${APP_PID}" >/dev/null 2>&1; then
              echo "后端进程提前退出，打印日志："
              tail -n 200 /tmp/nexusarchive-backend.log || true
              exit 1
            fi
            sleep 5
          done
          if [ "${ok}" -ne 1 ]; then
            echo "后端健康检查超时，打印日志："
            tail -n 200 /tmp/nexusarchive-backend.log || true
            exit 1
          fi
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nexusarchive
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: 运行权限集成测试
        run: |
          cd nexusarchive-java
          mvn test -Dtest=PermissionIntegrationTest,ThreeRoleExclusionIntegrationTest -DforkCount=0
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nexusarchive
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  # 前端权限测试
  frontend-permission-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 运行权限相关测试
        run: npm test -- --run --passWithNoTests "*Permission*" "*Auth*"

  # 测试报告汇总
  test-summary:
    runs-on: ubuntu-latest
    needs: [backend-permission-tests, backend-integration-tests, frontend-permission-tests]
    if: always()
    
    steps:
      - name: 测试结果汇总
        run: |
          echo "=========================================="
          echo "权限系统测试完成"
          echo "=========================================="
          echo "后端权限单元测试: ${{ needs.backend-permission-tests.result }}"
          echo "后端集成测试: ${{ needs.backend-integration-tests.result }}"
          echo "前端权限测试: ${{ needs.frontend-permission-tests.result }}"
          echo "=========================================="
