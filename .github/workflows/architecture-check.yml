# Architecture Defense CI Integration
# J3: Closed Rules - 架构违规阻止合并

name: Architecture Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  architecture-test:
    name: 架构规则验证
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 运行原有架构测试
        run: |
          cd nexusarchive-java
          mvn test -Dtest=ArchitectureTest -q

      - name: 运行增强架构测试
        run: |
          cd nexusarchive-java
          mvn test -Dtest=EnhancedArchitectureTest -q

      - name: 生成架构报告
        if: always()
        run: |
          echo "## 架构验证报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **J1 Self-Description**: 模块清单注解已配置" >> $GITHUB_STEP_SUMMARY
          echo "- **J2 Self-Check**: ArchUnit 自动化测试已运行" >> $GITHUB_STEP_SUMMARY
          echo "- **J3 Closed Rules**: CI 集成已完成，违规将阻止合并" >> $GITHUB_STEP_SUMMARY
          echo "- **J4 Reflex**: 运行时架构可见性已实现" >> $GITHUB_STEP_SUMMARY

  architecture-violation-check:
    name: 架构违规检查
    runs-on: ubuntu-latest
    needs: architecture-test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 检查新代码的架构违规
        run: |
          cd nexusarchive-java
          # 运行架构测试，如果有任何失败则工作流失败
          mvn test -Dtest=ArchitectureTest,EnhancedArchitectureTest

      - name: 生成违规报告
        if: failure()
        run: |
          echo "## ❌ 架构违规检测" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "架构测试失败！请检查并修复以下问题：" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. 查看测试日志了解具体违规内容" >> $GITHUB_STEP_SUMMARY
          echo "2. 参考 \`ArchitectureTest.java\` 和 \`EnhancedArchitectureTest.java\` 中的规则说明" >> $GITHUB_STEP_SUMMARY
          echo "3. 修复后重新提交 PR" >> $GITHUB_STEP_SUMMARY
          exit 1

  module-manifest-check:
    name: 模块清单检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查主要包是否有模块清单
        run: |
          cd nexusarchive-java/src/main/java/com/nexusarchive

          # 检查关键包是否有 package-info.java
          missing_packages=()

          for pkg in controller service mapper entity; do
            if [ ! -f "$pkg/package-info.java" ]; then
              missing_packages+=("$pkg")
            fi
          done

          if [ ${#missing_packages[@]} -gt 0 ]; then
            echo "## ❌ 缺少模块清单" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "以下包缺少 @ModuleManifest 注解：" >> $GITHUB_STEP_SUMMARY
            for pkg in "${missing_packages[@]}"; do
              echo "- \`$pkg/package-info.java\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请创建 package-info.java 文件并添加 @ModuleManifest 注解。" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: 验证模块清单完整性
        run: |
          echo "## ✅ 模块清单检查通过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "所有主要包都有 @ModuleManifest 注解。" >> $GITHUB_STEP_SUMMARY

  architecture-score:
    name: 架构健康评分
    runs-on: ubuntu-latest
    needs: [architecture-test, module-manifest-check]
    if: always()

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算架构健康评分
        run: |
          score=100

          # 根据作业结果调整评分
          if [ "${{ needs.architecture-test.result }}" != "success" ]; then
            score=$((score - 30))
          fi

          if [ "${{ needs.module-manifest-check.result }}" != "success" ]; then
            score=$((score - 20))
          fi

          echo "## 📊 架构健康评分: $score/100" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $score -eq 100 ]; then
            echo "🎉 **优秀** - 架构健康状况完美！" >> $GITHUB_STEP_SUMMARY
          elif [ $score -ge 80 ]; then
            echo "✅ **良好** - 架构健康状况良好，有小幅改进空间" >> $GITHUB_STEP_SUMMARY
          elif [ $score -ge 60 ]; then
            echo "⚠️ **警告** - 架构存在一些问题，需要关注" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚨 **严重** - 架构健康状况堪忧，需要立即改进" >> $GITHUB_STEP_SUMMARY
          fi
