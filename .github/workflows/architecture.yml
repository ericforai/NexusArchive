name: Architecture Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  frontend-arch:
    name: Frontend Architecture Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run architecture check
        run: npm run check:arch

      - name: Upload dependency graph
        if: failure()
        run: npm run check:arch:graph
        continue-on-error: true

      - name: Upload graph artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: arch-dependencies.svg
          retention-days: 7

  frontend-modules:
    name: Frontend Module Manifest Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate module manifest
        run: npm run modules:validate

  backend-arch:
    name: Backend Architecture Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run architecture tests
        working-directory: ./nexusarchive-java
        run: mvn test -Dtest=ArchitectureTest -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-arch-test-results
          path: nexusarchive-java/target/surefire-reports/
          retention-days: 7

  summary:
    name: Architecture Check Summary
    runs-on: ubuntu-latest
    needs: [frontend-arch, frontend-modules, backend-arch]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "### Architecture Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Dependencies | ${{ needs.frontend-arch.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Modules | ${{ needs.frontend-modules.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend-arch.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.frontend-arch.result }}" != "success" ] || [ "${{ needs.frontend-modules.result }}" != "success" ] || [ "${{ needs.backend-arch.result }}" != "success" ]; then
            echo "❌ Architecture check failed!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please fix the architecture violations before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ All architecture checks passed!" >> $GITHUB_STEP_SUMMARY
