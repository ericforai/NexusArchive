# YonSuite 凭证映射配置
# Source: YonSuite API (列表 API 结构)
# Target: AccountingSipDto (DA/T 94-2022 会计档案 SIP)

sourceSystem: yonsuite
targetModel: AccountingSipDto
version: 2.0.0

# 凭证头字段映射 (VoucherHeadDto)
headerMappings:
  accountPeriod:
    field: header.period

  voucherNumber:
    field: header.displayname

  voucherDate:
    field: header.maketime

  # attachmentCount 已在适配层通过附件列表长度自动计算，此处移除失效脚本

  issuer:
    field: header.maker.name

  reviewer:
    field: header.auditor.name

  poster:
    field: header.tallyman.name

  remark:
    field: header.description

  totalAmount:
    field: header.totalDebitOrg

# 分录映射 (VoucherEntryDto)
entries:
  source: body
  item:
    lineNo:
      field: recordnumber

    summary:
      field: description

    subjectCode:
      field: accsubject.code

    subjectName:
      field: accsubject.name

    direction:
      script: "import com.nexusarchive.common.enums.DirectionType; def debit = it.debitOrg ?: 0; def credit = it.creditOrg ?: 0; if (debit != null && debit > 0) DirectionType.DEBIT else if (credit != null && credit > 0) DirectionType.CREDIT else null"

    amount:
      script: "def debit = it.debitOrg ?: 0; def credit = it.creditOrg ?: 0; (debit != null && debit > 0) ? debit : credit"

    currencyCode:
      field: currency.code

    currencyName:
      field: currency.name

    debitOriginal:
      field: debitOriginal

    creditOriginal:
      field: creditOriginal

    exchangeRate:
      field: exchangeRate

# 附件映射 (AttachmentDto)
attachments:
  source: header.attachments
  item:
    fileName:
      field: fileName
    fileType:
      field: fileExtension
    fileSize:
      field: fileSize
    downloadUrl:
      field: url
    attachmentId:
      field: id
