# Input: Spring Boot 配置与环境变量
# Output: 后端应用配置
# Pos: 后端配置
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。

# 开发环境特定配置

# 电子签章配置（开发环境）
signature:
  keystore:
    path: ${SIGNATURE_KEYSTORE_PATH:}
    password: ${SIGNATURE_KEYSTORE_PASSWORD:}
  auto-sign: ${SIGNATURE_AUTO_SIGN:true}  # 开发环境默认启用自动签章
  default-cert-alias: ${SIGNATURE_CERT_ALIAS:signing-cert}

# License 配置 (开发环境显式指定)
license:
  file-path: ./data/license.json


# 时间戳服务配置（开发环境）
timestamp:
  enabled: ${TIMESTAMP_ENABLED:false}  # 开发环境默认禁用（需要配置TSA URL）
  tsa:
    url: ${TSA_URL:}  # 开发环境可以留空，使用降级模式
    username: ${TSA_USERNAME:}
    password: ${TSA_PASSWORD:}
    timeout: ${TSA_TIMEOUT:5000}
  fallback-on-error: ${TIMESTAMP_FALLBACK:false}  # 开发环境默认关闭降级
  auto-request: ${TIMESTAMP_AUTO_REQUEST:true}  # 开发环境默认启用自动时间戳





# Schema Validation（开发环境暂时禁用，允许测试）
schema:
  validation:
    enabled: false  # 暂时禁用以便测试
    fail-on-error: false

# 文件存储根路径（开发环境）
archive:
  root:
    path: /tmp/nexusarchive

# Token 黑名单服务配置（开发环境允许 Redis 降级）
token:
  blacklist:
    fail-open: true  # Redis 不可用时允许令牌通过（开发环境）

# YonSuite 配置（开发环境）
yonsuite:
  base-url: https://dbox.yonyoucloud.com/iuap-api-gateway
  app-key: 96a95c00982446cba484ccc4936b221b
  app-secret: ${YONSUITE_APP_SECRET:}

# 限流配置（开发环境禁用，避免影响开发调试）
security:
  rate-limit:
    enabled: false
