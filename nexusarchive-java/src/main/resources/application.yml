# Input: Spring Boot 配置与环境变量
# Output: 后端应用配置
# Pos: 后端配置
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。

server:
  port: ${SERVER_PORT:19090}
  servlet:
    context-path: /api

spring:
  application:
    name: nexusarchive

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    ignore-missing-migrations: true
    out-of-order: true
    validate-on-migrate: false
    locations: classpath:db/migration
  
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# JWT配置 (RS256)
jwt:
  public-key-location: ${JWT_PUBLIC_KEY_LOCATION:}
  private-key-location: ${JWT_PRIVATE_KEY_LOCATION:}
  expiration: 86400000 # 24小时 (毫秒)
  header: Authorization
  prefix: "Bearer "

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
logging:
  level:
    root: INFO
    com.nexusarchive: DEBUG
    org.springframework.security: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# 归档配置
archive:
  root:
    path: ${ARCHIVE_ROOT_PATH:./data/archives}
  temp:
    path: ${ARCHIVE_TEMP_PATH:./data/temp}

# YonSuite (用友) 集成配置 (安全加固: 敏感信息必须通过环境变量设置)
yonsuite:
  base-url: ${YONSUITE_BASE_URL:https://dbox.yonyoucloud.com/iuap-api-gateway}
  app-key: ${YONSUITE_APP_KEY:}
  app-secret: ${YONSUITE_APP_SECRET:}

# Elasticsearch 全文检索配置 (可选, 默认禁用)
elasticsearch:
  enabled: ${ES_ENABLED:false}
  hosts: ${ES_HOSTS:localhost:9200}
  username: ${ES_USERNAME:}
  password: ${ES_PASSWORD:}
  connect-timeout: 5000
  socket-timeout: 30000

# 电子签章配置
signature:
  keystore:
    path: ${SIGNATURE_KEYSTORE_PATH:}
    password: ${SIGNATURE_KEYSTORE_PASSWORD:}

# 时间戳服务配置
timestamp:
  enabled: ${TIMESTAMP_ENABLED:false}
  tsa:
    url: ${TSA_URL:}
    username: ${TSA_USERNAME:}
    password: ${TSA_PASSWORD:}
    timeout: ${TSA_TIMEOUT:5000}
  fallback-on-error: ${TIMESTAMP_FALLBACK:false}  # TSA 不可用时默认失败

# Entity-Database Schema 一致性验证 (防止 Entity 字段与数据库列不同步)
schema:
  validation:
    enabled: ${SCHEMA_VALIDATION_ENABLED:true}           # 是否启用验证
    fail-on-error: ${SCHEMA_VALIDATION_FAIL:true}       # 发现问题时是否阻止启动
    entity-package: com.nexusarchive.entity              # Entity 包路径

# License 配置
license:
  public-key: 
  file-path: ${LICENSE_FILE_PATH:} # Optional: Verify specific license file path

# 审计日志哈希链 HMAC 密钥
audit:
  log:
    hmac-key: ${AUDIT_LOG_HMAC_KEY:}

# 病毒扫描配置 (Mock | ClamAV)
virus:
  scan:
    type: ${VIRUS_SCAN_TYPE:mock}
    clamav:
      host: ${VIRUS_SCAN_HOST:localhost}
      port: ${VIRUS_SCAN_PORT:3310}

# MFA 多因素认证配置
mfa:
  enabled: ${MFA_ENABLED:false}  # MFA 功能开关，默认禁用（待实现完成后启用）

app:
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:15175,http://localhost:3000,http://localhost:5173}

---
# 开发环境 - PostgreSQL
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexusarchive}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 1000
      validation-timeout: 1000
      initialization-fail-timeout: 0
      idle-timeout: 600000
      max-lifetime: 1800000

---
# 生产环境 - PostgreSQL
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexusarchive}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:nexus}
    password: ${DB_PASSWORD}
    
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# 归档临时文件路径 (生产环境)
archive:
  temp:
    path: ${ARCHIVE_TEMP_PATH:/opt/nexusarchive/data/temp}
  root:
    path: /opt/nexusarchive/data/archives

