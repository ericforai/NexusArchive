server:
  port: ${SERVER_PORT:19090}
  servlet:
    context-path: /api

spring:
  application:
    name: nexusarchive
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  flyway:
    enabled: false
    baseline-on-migrate: true
    repair-on-migrate: true
    ignore-missing-migrations: true
    out-of-order: true
    validate-on-migrate: false
    locations: classpath:db/migration
  
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# JWT配置 (安全加固: 生产环境必须设置 JWT_SECRET 环境变量)
jwt:
  secret: ${JWT_SECRET:NexusArchiveDev2024SecretKey!!MustBeAtLeast256BitsLongForHS256Algorithm}
  expiration: 86400000 # 24小时 (毫秒)
  header: Authorization
  prefix: "Bearer "

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
logging:
  level:
    root: INFO
    com.nexusarchive: DEBUG
    org.springframework.security: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# 归档配置
archive:
  root:
    path: ${ARCHIVE_ROOT_PATH:./data/archives}
  temp:
    path: ${ARCHIVE_TEMP_PATH:./data/temp}

# YonSuite (用友) 集成配置 (安全加固: 敏感信息必须通过环境变量设置)
yonsuite:
  base-url: ${YONSUITE_BASE_URL:https://dbox.yonyoucloud.com/iuap-api-gateway}
  app-key: ${YONSUITE_APP_KEY:}
  app-secret: ${YONSUITE_APP_SECRET:}

# Elasticsearch 全文检索配置 (可选, 默认禁用)
elasticsearch:
  enabled: ${ES_ENABLED:false}
  hosts: ${ES_HOSTS:localhost:9200}
  username: ${ES_USERNAME:}
  password: ${ES_PASSWORD:}
  connect-timeout: 5000
  socket-timeout: 30000

# 电子签章配置
signature:
  keystore:
    path: ${SIGNATURE_KEYSTORE_PATH:./keystore/signature.p12}
    password: ${SIGNATURE_KEYSTORE_PASSWORD:changeit}

# 时间戳服务配置
timestamp:
  enabled: ${TIMESTAMP_ENABLED:false}
  tsa:
    url: ${TSA_URL:}
    username: ${TSA_USERNAME:}
    password: ${TSA_PASSWORD:}
    timeout: ${TSA_TIMEOUT:5000}
  fallback-on-error: ${TIMESTAMP_FALLBACK:true}  # TSA 不可用时使用本地时间

# Entity-Database Schema 一致性验证 (防止 Entity 字段与数据库列不同步)
schema:
  validation:
    enabled: ${SCHEMA_VALIDATION_ENABLED:true}           # 是否启用验证
    fail-on-error: ${SCHEMA_VALIDATION_FAIL:true}       # 发现问题时是否阻止启动
    entity-package: com.nexusarchive.entity              # Entity 包路径

# License 配置
license:
  public-key: 

# 病毒扫描配置 (Mock | ClamAV)
virus:
  scan:
    type: ${VIRUS_SCAN_TYPE:mock}
    clamav:
      host: ${VIRUS_SCAN_HOST:localhost}
      port: ${VIRUS_SCAN_PORT:3310}

---
# 开发环境 - PostgreSQL
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexusarchive}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 1000
      validation-timeout: 1000
      initialization-fail-timeout: 0
      idle-timeout: 600000
      max-lifetime: 1800000

---
# 生产环境 - 达梦数据库
spring:
  config:
    activate:
      on-profile: prod-dameng
  
  datasource:
    driver-class-name: dm.jdbc.driver.DmDriver
    url: jdbc:dm://${DB_HOST:localhost}:${DB_PORT:5236}/${DB_NAME:NEXUSARCHIVE}?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=utf-8
    username: ${DB_USER:SYSDBA}
    password: ${DB_PASSWORD:SYSDBA}
    
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
  
  # 生产环境存储路径
  archive:
    root:
      path: /opt/nexusarchive/data/archives

---
# 生产环境 - 人大金仓
spring:
  config:
    activate:
      on-profile: prod-kingbase
  
  datasource:
    driver-class-name: com.kingbase8.Driver
    url: jdbc:kingbase8://${DB_HOST:localhost}:${DB_PORT:54321}/${DB_NAME:nexusarchive}?useUnicode=true&characterEncoding=utf-8
    username: ${DB_USER:system}
    password: ${DB_PASSWORD:system}
    
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000

  # 生产环境存储路径
  archive:
    root:
      path: /opt/nexusarchive/data/archives

---
# 生产环境 - PostgreSQL
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexusarchive}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:nexus}
    password: ${DB_PASSWORD}
    
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# 归档临时文件路径 (生产环境)
archive:
  temp:
    path: ${ARCHIVE_TEMP_PATH:/opt/nexusarchive/data/temp}
  root:
    path: /opt/nexusarchive/data/archives

