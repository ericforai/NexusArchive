# Input: Spring Boot 配置与环境变量
# Output: 后端应用配置
# Pos: 后端配置
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。

server.port=19090
# JWT Settings (RS256 Asymmetric Keys)
# IMPORTANT: Configure via environment or a secure config source.
# The private key file must be strictly permission-controlled on the server.

jwt.public-key-location=${JWT_PUBLIC_KEY_LOCATION:}
jwt.private-key-location=${JWT_PRIVATE_KEY_LOCATION:}

# Token expiration time in milliseconds (e.g., 1 hour = 3600000)
jwt.expiration=3600000

# Security - CORS Settings
# In production, this should be specific domains like https://archive.yourcompany.com
app.security.cors.allowed-origins=http://localhost:15175,http://127.0.0.1:15175,http://localhost:5175,http://localhost:5173,http://localhost:3000
