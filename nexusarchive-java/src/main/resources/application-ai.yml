# nexusarchive-java/src/main/resources/application-ai.yml
ai:
  enabled: ${AI_ENABLED:true}  # 启用 AI 生成
  fallback-to-template: ${AI_FALLBACK_TO_TEMPLATE:true}  # AI 不可用时回退到模板生成
  claude:
    enabled: true
    api-key: ${CLAUDE_API_KEY:}
    model: deepseek-chat  # DeepSeek 模型 (deepseek-chat 或 deepseek-coder)
    max-tokens: 8192
    temperature: 0.3
    timeout: 60000
