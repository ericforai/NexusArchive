spring:
  datasource:
    url: jdbc:h2:mem:nexus_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  sql:
    init:
      mode: always
  flyway:
    enabled: false
    locations: classpath:db/migration
    clean-on-validation-error: true
    out-of-order: true
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Disable ES for tests
elasticsearch:
  enabled: false

# Disable ERP sync
yonsuite:
  base-url: http://mock-yonsuite
  app-key: mock-app-key
  app-secret: mock-app-secret

archive:
  root:
    path: ./target/test-archives

jwt:
  secret: TestSecretKeyDoNotUseInProductionMustBe256BitsLong
  expiration: 3600000

