# Input: Spring Boot 配置与环境变量
# Output: 后端应用配置
# Pos: 后端配置
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。

# Test Profile Configuration
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nexusarchive
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# 禁用 YonSuite 在测试中
yonsuite:
  enabled: false

# AI 配置 - 测试环境默认关闭，避免真实 API 调用
ai:
  claude:
    enabled: false
    timeout: 5000

# 日志简化
logging:
  level:
    com.nexusarchive: INFO
    org.springframework: WARN
