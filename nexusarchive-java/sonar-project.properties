# Input: SonarQube configuration for NexusArchive
# Output: sonar-project.properties
# Pos: nexusarchive-java/

# ==== 项目基本信息 ====
sonar.projectKey=nexusarchive
# sonar.organization=nexusarchive  # 仅 SonarCloud 需要
sonar.projectName=NexusArchive
sonar.projectVersion=1.0.0

# ==== 代码位置 ====
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# ==== 排除文件 ====
# 生成的代码、DTO、实体类不需要深度分析
sonar.exclusions=\
  **/generated/**,\
  **/dto/**,\
  **/entity/**,\
  **/serializer/**,\
  **/annotation/GeneratedType.java,\
  **/config/**/*Config.java

# 测试排除
sonar.test.exclusions=\
  **/test/resources/**,\
  **/mock/**

# ==== 覆盖率配置 ====
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.core.codeCoveragePlugin=jacoco

# 新代码覆盖率基线（最近 30 天的代码）
sonar.coverage.newCode.period=30

# ==== 质量门禁 ====
# 等待质量门禁结果
sonar.qualitygate.wait=true
# 质量门禁超时时间（分钟）
sonar.qualitygate.timeout=5

# ==== 编码规则 ====
# Java 规则集
sonar.profile.java=Sonar way

# ==== 排除规则 ====
# 排除某些不太适用于项目的规则
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# e1: DTO 中的 getter/setter 不需要检测复杂度
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1172
sonar.issue.ignore.multicriteria.e1.resourceKey=**/dto/**

# e2: Lombok 生成的方法参数未使用警告
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S1172
sonar.issue.ignore.multicriteria.e2.resourceKey=**/entity/**

# e3: 测试类中的公共方法
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S1144
sonar.issue.ignore.multicriteria.e3.resourceKey=**/test/**

# e4: 数据库迁移脚本中的 SQL 注入误报
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S2077
sonar.issue.ignore.multicriteria.e4.resourceKey=**/migration/**

# ==== 其他配置 ====
# 源代码编码
sonar.sourceEncoding=UTF-8

# 语言
sonar.language=java

# 跳过插件分析（加快速度）
sonar.maven.skip=false
