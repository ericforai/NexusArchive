# Input: Docker/Compose 与环境变量
# Output: 容器编排配置
# Pos: 部署/运行配置
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。



services:
  nexus-db:
    image: postgres:14-alpine
    container_name: nexus-db
    environment:
      POSTGRES_DB: nexusarchive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54321:5432" # 外部映射到 54321 避免与本地 5432 冲突
    volumes:
      - nexus-db-data:/var/lib/postgresql/data

  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "16379:6379"

  nexus-backend:
    build:
      context: ./nexusarchive-java
      dockerfile: Dockerfile
    container_name: nexus-backend
    ports:
      - "28080:19090" # Docker 专用端口段，避免与本地 19090 冲突
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://nexus-db:5432/nexusarchive
      - SPRING_DATA_REDIS_HOST=nexus-redis
      - SERVER_PORT=19090
      - JWT_PUBLIC_KEY_LOCATION=file:/app/keystore/jwt_public.pem
      - JWT_PRIVATE_KEY_LOCATION=file:/app/keystore/jwt_private.pem
      - SM4_KEY=a1b2c3d4e5f67890a1b2c3d4e5f67890
    depends_on:
      - nexus-db
      - nexus-redis
    volumes:
      - ./nexusarchive-java/data:/app/data
      - ./nexusarchive-java/keystore:/app/keystore
      - ./nexusarchive-java/logs:/app/logs

  nexus-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nexus-frontend
    ports:
      - "28175:15175" # Docker 专用端口段，避免与本地 15175 冲突
    depends_on:
      - nexus-backend
    environment:
      - VITE_API_BASE_URL=http://nexus-backend:19090/api
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  nexus-db-data:
