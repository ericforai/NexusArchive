# ==============================================================================
# ⚠️  AI CODING WARNING - 重要规则 ⚠️
# ==============================================================================
# 
# 健康检查必须使用 127.0.0.1，禁止使用 localhost
# 原因：Alpine Linux中localhost解析为IPv6 ::1，导致健康检查失败
# 
# ❌ 错误示例：test: ["CMD", "wget", "-q", "--spider", "http://localhost:15175"]
# ✅ 正确示例：test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:15175"]
#
# 修改任何健康检查配置时，必须遵守此规则！
#
# 详细说明：docs/DOCKER_BUILD_GUIDE.md
# ==============================================================================

# 开发环境全栈 Docker Compose 配置
# 用法: docker-compose -f docker-compose.dev.yml --env-file .env.dev up -d
# 
# 包含服务: PostgreSQL + Redis + Backend + Frontend (热重载)
# 端口: DB:54321, Redis:16379, Backend:19090, Frontend:15175

services:
  # PostgreSQL 数据库 (开发专用 Volume)
  nexus-db:
    image: postgres:14-alpine
    container_name: nexus-db-dev
    environment:
      POSTGRES_DB: ${DB_NAME:-nexusarchive}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "54321:5432"
    volumes:
      - nexus-db-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis-dev
    ports:
      - "16379:6379"
    volumes:
      - nexus-redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Java 后端 (开发模式)
  nexus-backend:
    image: nexusarchive-backend:dev
    build:
      context: ./nexusarchive-java
      dockerfile: Dockerfile
    container_name: nexus-backend-dev
    restart: unless-stopped
    depends_on:
      nexus-db:
        condition: service_healthy
      nexus-redis:
        condition: service_healthy
    environment:
      # 数据库配置 (使用 Docker 内部网络)
      DB_HOST: nexus-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexusarchive}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Redis 配置
      REDIS_HOST: nexus-redis
      REDIS_PORT: 6379
      # Spring Profile
      SPRING_PROFILES_ACTIVE: dev
      # 安全配置
      SM4_KEY: ${SM4_KEY:-a1b2c3d4e5f67890a1b2c3d4e5f67890}
      AUDIT_LOG_HMAC_KEY: ${AUDIT_LOG_HMAC_KEY:-dev_hmac_key_for_development_only}
      JWT_PUBLIC_KEY_LOCATION: file:/app/keystore/jwt_public.pem
      JWT_PRIVATE_KEY_LOCATION: file:/app/keystore/jwt_private.pem
      # 开发配置
      VIRUS_SCAN_TYPE: mock
      TIMESTAMP_FALLBACK: "true"
      # Schema 验证：开发环境启用，发现不一致时阻止启动
      SCHEMA_VALIDATION_ENABLED: "true"
      SCHEMA_VALIDATION_FAIL: "false"  # 开发环境只警告，不完全阻止（方便调试）
      # CORS (前端开发服务器)
      APP_SECURITY_CORS_ALLOWED_ORIGINS: http://localhost:15175,http://127.0.0.1:15175
      # YonSuite (可选)
      YONSUITE_APP_KEY: ${YONSUITE_APP_KEY:-}
      YONSUITE_APP_SECRET: ${YONSUITE_APP_SECRET:-}
      # DeepSeek AI 配置
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}  # DeepSeek API Key
    ports:
      - "19090:19090"
    volumes:
      - ./nexusarchive-java/data:/app/data
      - ./nexusarchive-java/keystore:/app/keystore
      # AI 生成的适配器代码持久化到宿主机
      - ./nexusarchive-java/src/main/java/com/nexusarchive/integration/erp/adapter:/app/src/main/java/com/nexusarchive/integration/erp/adapter
      - ./nexusarchive-java/src/test/java/com/nexusarchive/integration/erp/adapter:/app/src/test/java/com/nexusarchive/integration/erp/adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:19090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端 (Vite 开发服务器, 热重载)
  nexus-frontend:
    image: nexusarchive-web:dev
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nexus-frontend-dev
    restart: unless-stopped
    depends_on:
      - nexus-backend
    environment:
      - VITE_API_BASE_URL=http://nexus-backend:19090/api
    ports:
      - "15175:15175"
    volumes:
      # 挂载源码实现热重载
      - ./src:/app/src:ro
      - ./public:/app/public:ro
      - ./index.html:/app/index.html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:15175"]
      interval: 30s
      timeout: 10s
      retries: 3

# 开发专用 Volume (与生产隔离)
volumes:
  nexus-db-dev-data:
    name: nexusarchive-db-dev
  nexus-redis-dev-data:
    name: nexusarchive-redis-dev
