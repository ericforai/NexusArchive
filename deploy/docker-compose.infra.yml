# ==============================================================================
# 基础设施配置 - PostgreSQL + Redis
# ==============================================================================
# 用途: 本地开发、服务器部署通用
# 启动: docker-compose -f docker-compose.infra.yml --env-file .env.local up -d
#
# 端口:
#   PostgreSQL: 54321 (本地) / 5432 (服务器内部)
#   Redis: 16379 (本地) / 6379 (服务器内部)
#
# 说明:
#   - 本地开发时，DB 和 Redis 跑在 Docker 中，应用跑在宿主机上
#   - 服务器部署时，所有服务都跑在 Docker 中
#   - 首次启动会自动导入 db/seed-data.sql
# ==============================================================================

services:
  # PostgreSQL 数据库
  nexus-db:
    image: postgres:14-alpine
    container_name: nexus-db
    environment:
      POSTGRES_DB: ${DB_NAME:-nexusarchive}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      # 首次启动时自动执行 seed-data.sql
      POSTGRES_INITDB_SCRIPTS_PATH: /docker-entrypoint-initdb.d
    ports:
      # 本地开发使用 54321 避免与本地 PostgreSQL 冲突
      # 服务器部署可通过 .env.server 设置为 5432
      - "${DB_PORT:-54321}:5432"
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
      # Seed data 挂载（首次启动或 volume 为空时自动执行）
      - ./db/seed-data.sql:/docker-entrypoint-initdb.d/99-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      # 本地开发使用 16379 避免与本地 Redis 冲突
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - nexus-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nexus-db-data:
    name: nexusarchive-db
  nexus-redis-data:
    name: nexusarchive-redis
