apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexusarchive.fullname" . }}-backend
spec:
  type: ClusterIP
  selector:
    app: {{ include "nexusarchive.fullname" . }}-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      name: http
