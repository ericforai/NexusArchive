# Input: Helm 模板变量
# Output: Kubernetes 资源配置
# Pos: K8s 部署配置
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。

apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexusarchive.fullname" . }}-frontend
spec:
  type: ClusterIP
  selector:
    app: {{ include "nexusarchive.fullname" . }}-frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
      name: http
