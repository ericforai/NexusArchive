apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexusarchive.fullname" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "nexusarchive.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "nexusarchive.fullname" . }}-frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.image.frontend }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          env:
            {{- range $key, $val := .Values.frontend.env }}
            - name: {{ $key }}
              value: "{{ $val }}"
            {{- end }}
