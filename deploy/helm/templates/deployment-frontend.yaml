# Input: Helm 模板变量
# Output: Kubernetes 资源配置
# Pos: K8s 部署配置
# 一旦我被更新，务必更新我的开头注释，以及所属的文件夹的 md。

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexusarchive.fullname" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "nexusarchive.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "nexusarchive.fullname" . }}-frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.image.frontend }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          env:
            {{- range $key, $val := .Values.frontend.env }}
            - name: {{ $key }}
              value: "{{ $val }}"
            {{- end }}
