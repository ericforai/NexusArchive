  <script>
    (function () {
      console.log('[StoragePolyfill] Initializing aggressive patch...');

      function createMemoryStorage() {
        let store = {};
        return {
          getItem: function (key) { return store[key] || null; },
          setItem: function (key, value) { store[key] = String(value); },
          removeItem: function (key) { delete store[key]; },
          clear: function () { store = {}; },
          key: function (index) { return Object.keys(store)[index] || null; },
          get length() { return Object.keys(store).length; }
        };
      }

      function patchStorage(type) {
        try {
          const storage = window[type];
          const x = '__storage_test__';
          storage.setItem(x, x);
          storage.removeItem(x);
          return; // Supported
        } catch (e) {
          console.warn(`[StoragePolyfill] ${type} is blocked. Patching...`);
        }

        try {
          // Try to delete the property first (in case it's a getter that throws)
          try { delete window[type]; } catch (e) { }

          Object.defineProperty(window, type, {
            value: createMemoryStorage(),
            configurable: true,
            enumerable: true,
            writable: true
          });
        } catch (e) {
          console.error(`[StoragePolyfill] Failed to patch ${type}:`, e);
        }
      }

      patchStorage('localStorage');
      patchStorage('sessionStorage');

      // Patch IndexedDB (often blocked together with storage)
      try {
        if (!window.indexedDB) {
          console.warn('[StoragePolyfill] IndexedDB is missing. Patching with null...');
          // Minimal mock to prevent crash on property access, though functionality will break
          Object.defineProperty(window, 'indexedDB', {
            value: {
              open: () => ({ result: null, error: new Error('IndexedDB blocked'), onsuccess: null, onerror: null }),
            },
            configurable: true, enumerable: true, writable: true
          });
        }
      } catch (e) {
        console.warn('[StoragePolyfill] Failed to patch IndexedDB:', e);
      }

      console.log('[StoragePolyfill] Initialization complete.');
    })();
  </script>
