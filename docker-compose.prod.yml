# 生产环境 Docker Compose 配置
# 用法: docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  # PostgreSQL 数据库
  nexus-db:
    image: postgres:14-alpine
    container_name: nexus-db
    restart: always
    environment:
      POSTGRES_DB: nexusarchive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password_here}
    ports:
      - "5432:5432"
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - nexus-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Java 后端
  nexus-backend:
    image: nexusarchive-backend:${TAG:-latest}
    build:
      context: ./nexusarchive-java
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: always
    depends_on:
      nexus-db:
        condition: service_healthy
      nexus-redis:
        condition: service_healthy
    environment:
      # 数据库配置
      DB_HOST: nexus-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexusarchive}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis 配置
      REDIS_HOST: nexus-redis
      REDIS_PORT: 6379
      # 应用配置
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      APP_SECURITY_CORS_ALLOWED_ORIGINS: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost}
      # 安全配置
      SM4_KEY: ${SM4_KEY:-}
      VIRUS_SCAN_TYPE: ${VIRUS_SCAN_TYPE:-mock}
      SCHEMA_VALIDATION_ENABLED: ${SCHEMA_VALIDATION_ENABLED:-false}
      # 用友集成
      YONSUITE_APP_KEY: ${YONSUITE_APP_KEY:-}
      YONSUITE_APP_SECRET: ${YONSUITE_APP_SECRET:-}
    ports:
      - "19090:19090"
    volumes:
      - ./nexusarchive-java/data:/app/data
      - ./nexusarchive-java/keystore:/app/keystore
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端 (Nginx 托管静态文件)
  nexus-frontend:
    image: nexusarchive-web:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    container_name: nexus-frontend
    restart: always
    depends_on:
      - nexus-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nexus-db-data:
  nexus-redis-data:
