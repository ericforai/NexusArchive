# ==============================================================================
# 生产环境完整配置
# ==============================================================================
# 用途: 生产环境一键部署（包含基础设施 + 应用服务）
# 启动: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# 停止: docker compose -f docker-compose.prod.yml down
#
# 资源限制（适配 4GB 内存服务器）：
#   nexus-backend:  768MB (JVM -Xmx768m)
#   nexus-frontend: 256MB  (Nginx Alpine)
#   nexus-db:       512MB  (PostgreSQL)
#   nexus-redis:    128MB  (Redis Alpine)
#   总计: ~3.2GB (预留系统开销)
# ==============================================================================

# 包含基础设施（DB、Redis）
include:
  - docker-compose.infra.yml
  - docker-compose.app.yml

# 生产环境覆盖配置（适配 4GB 内存服务器）
services:
  nexus-backend:
    environment:
      # 生产环境使用 prod profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M

  nexus-frontend:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  nexus-db:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nexus-redis:
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  nexus-db-data:
    name: nexusarchive-prod-db-data
  nexus-redis-data:
    name: nexusarchive-prod-redis-data
