# 生产环境 Docker Compose 配置
# 用法: docker-compose -f docker-compose.prod.yml up -d --build

services:
  # PostgreSQL 数据库
  nexus-db:
    image: postgres:14-alpine
    container_name: nexus-db
    restart: always
    environment:
      POSTGRES_DB: nexusarchive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password_here}
    ports:
      - "5432:5432"
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - nexus-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Java 后端
  nexus-backend:
    image: nexusarchive-backend:${TAG:-latest}
    build:
      context: ./nexusarchive-java
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: always

# ... (middle content omitted)

  # 前端 (Nginx 托管静态文件)
  nexus-frontend:
    image: nexusarchive-web:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    container_name: nexus-frontend
    restart: always
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL 证书目录
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nexus-db-data:
  nexus-redis-data:
