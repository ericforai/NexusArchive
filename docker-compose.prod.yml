# 生产环境 Docker Compose 配置
# 用法: docker-compose -f docker-compose.prod.yml up -d --build

services:
  # PostgreSQL 数据库
  nexus-db:
    image: postgres:14-alpine
    container_name: nexus-db
    restart: always
    environment:
      POSTGRES_DB: nexusarchive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password_here}
    ports:
      - "5432:5432"
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - nexus-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Java 后端
  nexus-backend:
    build:
      context: ./nexusarchive-java
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: always
    ports:
      - "19090:19090"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://nexus-db:5432/nexusarchive
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-your_secure_password_here}
      - SPRING_DATA_REDIS_HOST=nexus-redis
      - SERVER_PORT=19090
      - APP_SECURITY_CORS_ALLOWED_ORIGINS=https://www.digivoucher.cn,https://digivoucher.cn
      - JWT_PUBLIC_KEY_LOCATION=file:/app/keystore/jwt_public.pem
      - JWT_PRIVATE_KEY_LOCATION=file:/app/keystore/jwt_private.pem
      - SM4_KEY=${SM4_KEY:-a1b2c3d4e5f67890a1b2c3d4e5f67890}
    depends_on:
      nexus-db:
        condition: service_healthy
      nexus-redis:
        condition: service_healthy
    volumes:
      - ./nexusarchive-java/data:/app/data
      - ./nexusarchive-java/keystore:/app/keystore
      - ./nexusarchive-java/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 (Nginx 托管静态文件)
  nexus-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    container_name: nexus-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nexus-backend
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL 证书目录
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nexus-db-data:
  nexus-redis-data:
